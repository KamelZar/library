spring:
  application:
    name: libraryapp
  datasource:
    url: jdbc:h2:file:${DB_PATH:./data/librarydb};AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8080

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:changeme}
  security:
    max-login-attempts: 3
    blacklist-duration-minutes: 15
