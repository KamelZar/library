services:
  tailscale-library:
    image: tailscale/tailscale:latest
    hostname: library
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - tailscale-library-state:/var/lib/tailscale
    restart: unless-stopped

  libraryapp:
    build: .
    image: libraryapp:latest
    restart: unless-stopped
    network_mode: service:tailscale-library
    depends_on:
      - tailscale-library
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - libraryapp-data:/data

volumes:
  libraryapp-data:
  tailscale-library-state:
